<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>学習ポータル</title>
<style>
:root {
  --blue: #2563eb;
  --blue-light: #eff6ff;
  --green: #16a34a;
  --green-light: #f0fdf4;
  --orange: #ea580c;
  --orange-light: #fff7ed;
  --red: #dc2626;
  --red-light: #fef2f2;
  --purple: #7c3aed;
  --purple-light: #f5f3ff;
  --bg: #f8fafc;
  --text: #1e293b;
  --text-sub: #64748b;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  padding: 24px 16px 40px;
  min-height: 100dvh;
}
.header {
  text-align: center;
  margin-bottom: 28px;
}
.header h1 {
  font-size: 1.5rem;
  font-weight: 700;
  letter-spacing: 0.02em;
}
.section {
  margin-bottom: 24px;
}
.section-label {
  font-size: 0.8rem;
  font-weight: 600;
  text-transform: uppercase;
  letter-spacing: 0.08em;
  padding: 0 4px;
  margin-bottom: 10px;
}
.grid {
  display: grid;
  grid-template-columns: repeat(2, 1fr);
  gap: 12px;
}
.card {
  display: flex;
  flex-direction: column;
  align-items: center;
  justify-content: center;
  text-decoration: none;
  border-radius: 16px;
  padding: 24px 12px;
  min-height: 120px;
  border: 2px solid transparent;
  transition: transform 0.1s, box-shadow 0.1s;
  -webkit-tap-highlight-color: transparent;
}
.card:active {
  transform: scale(0.97);
}
.card-icon {
  font-size: 2rem;
  margin-bottom: 8px;
}
.card-title {
  font-size: 0.95rem;
  font-weight: 600;
  text-align: center;
  line-height: 1.3;
  color: var(--text);
}
.card-sub {
  font-size: 0.75rem;
  color: var(--text-sub);
  margin-top: 4px;
}

/* Color themes */
.card.blue { background: var(--blue-light); border-color: #bfdbfe; }
.card.blue .card-icon { color: var(--blue); }
.card.green { background: var(--green-light); border-color: #bbf7d0; }
.card.green .card-icon { color: var(--green); }
.card.orange { background: var(--orange-light); border-color: #fed7aa; }
.card.orange .card-icon { color: var(--orange); }
.card.red { background: var(--red-light); border-color: #fecaca; }
.card.red .card-icon { color: var(--red); }
.card.purple { background: var(--purple-light); border-color: #ddd6fe; }
.card.purple .card-icon { color: var(--purple); }

.section-label.blue { color: var(--blue); }
.section-label.green { color: var(--green); }
.section-label.orange { color: var(--orange); }
.section-label.red { color: var(--red); }
.section-label.purple { color: var(--purple); }

/* Single card in a row */
.grid.single {
  grid-template-columns: 1fr;
  max-width: 50%;
}

@media (max-width: 400px) {
  .grid { gap: 10px; }
  .card { padding: 20px 10px; min-height: 100px; }
  .card-icon { font-size: 1.7rem; }
  .card-title { font-size: 0.85rem; }
}
</style>
</head>
<body>
<div class="header">
  <h1>学習ポータル</h1>
</div>

<div class="section">
  <div class="section-label blue">算数</div>
  <div class="grid">
    <a href="https://komaguchi-wq.github.io/math-quiz/" class="card blue">
      <div class="card-icon">📐</div>
      <div class="card-title">SAPIX算数演習</div>
    </a>
    <a href="https://komaguchi-wq.github.io/kobetsuba-web-jugyou/" class="card blue">
      <div class="card-icon">📘</div>
      <div class="card-title">コベツバ＆でる順</div>
    </a>
    <a href="https://komaguchi-wq.github.io/math-challenge/" class="card blue">
      <div class="card-icon">🔢</div>
      <div class="card-title">計算</div>
    </a>
  </div>
</div>

<div class="section">
  <div class="section-label green">理科</div>
  <div class="grid single">
    <a href="https://komaguchi-wq.github.io/science-daily-check/" class="card green">
      <div class="card-icon">🧪</div>
      <div class="card-title">SAPIX理科</div>
    </a>
  </div>
</div>

<div class="section">
  <div class="section-label orange">社会</div>
  <div class="grid single">
    <a href="https://komaguchi-wq.github.io/shakai-daily-check/" class="card orange">
      <div class="card-icon">🌍</div>
      <div class="card-title">SAPIX社会</div>
    </a>
  </div>
</div>

<div class="section">
  <div class="section-label red">国語</div>
  <div class="grid single">
    <a href="https://komaguchi-wq.github.io/kokugo-kotobanavi/" class="card red">
      <div class="card-icon">📖</div>
      <div class="card-title">言葉ナビ</div>
    </a>
  </div>
</div>

<div class="section">
  <div class="section-label purple">情報・ガイド</div>
  <div class="grid">
    <a href="https://komaguchi-wq.github.io/sapix-info/" class="card purple">
      <div class="card-icon">📋</div>
      <div class="card-title">SAPIX情報</div>
    </a>
    <a href="https://komaguchi-wq.github.io/juken-guide/" class="card purple">
      <div class="card-icon">🏫</div>
      <div class="card-title">中学入試ガイド</div>
    </a>
  </div>
</div>
</body>
</html>
