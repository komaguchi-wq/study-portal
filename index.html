<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>学習ポータル</title>
<style>
:root {
  --blue: #2563eb;
  --blue-light: #eff6ff;
  --blue-border: #bfdbfe;
  --green: #16a34a;
  --green-light: #f0fdf4;
  --green-border: #bbf7d0;
  --orange: #ea580c;
  --orange-light: #fff7ed;
  --orange-border: #fed7aa;
  --red: #dc2626;
  --red-light: #fef2f2;
  --red-border: #fecaca;
  --purple: #7c3aed;
  --purple-light: #f5f3ff;
  --purple-border: #ddd6fe;
  --bg: #f2f2f7;
  --text: #1e293b;
  --text-sub: #8e8e93;
}
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Hiragino Kaku Gothic ProN', 'Hiragino Sans', sans-serif;
  background: var(--bg);
  color: var(--text);
  min-height: 100dvh;
}
.screen-content {
  padding: 16px;
  max-width: 600px;
  margin: 0 auto;
}
.header {
  text-align: center;
  padding: 24px 16px 8px;
}
.header h1 {
  font-size: 1.4rem;
  font-weight: 700;
}
.section {
  margin-bottom: 20px;
}
.section-label {
  font-size: 13px;
  font-weight: 600;
  letter-spacing: 0.04em;
  padding: 0 4px;
  margin-bottom: 8px;
}
.card-list {
  display: flex;
  flex-direction: column;
  gap: 8px;
}
.card {
  display: flex;
  align-items: center;
  gap: 14px;
  text-decoration: none;
  background: #fff;
  border-radius: 12px;
  padding: 16px;
  border-left: 4px solid transparent;
  transition: background 0.15s;
  -webkit-tap-highlight-color: transparent;
}
.card:active {
  background: #f2f2f7;
}
.card-icon {
  font-size: 1.6rem;
  flex-shrink: 0;
  width: 40px;
  text-align: center;
}
.card-title {
  font-size: 16px;
  font-weight: 600;
  color: var(--text);
  line-height: 1.3;
}
.card-chevron {
  margin-left: auto;
  color: #c7c7cc;
  font-size: 18px;
  flex-shrink: 0;
}

/* Color themes */
.card.blue { border-left-color: var(--blue); }
.card.green { border-left-color: var(--green); }
.card.orange { border-left-color: var(--orange); }
.card.red { border-left-color: var(--red); }
.card.purple { border-left-color: var(--purple); }

.section-label.blue { color: var(--blue); }
.section-label.green { color: var(--green); }
.section-label.orange { color: var(--orange); }
.section-label.red { color: var(--red); }
.section-label.purple { color: var(--purple); }
</style>
</head>
<body>
<div class="header">
  <h1>学習ポータル</h1>
</div>

<div class="screen-content">

<div class="section">
  <div class="section-label blue">算数</div>
  <div class="card-list">
    <a href="https://komaguchi-wq.github.io/math-quiz/" class="card blue">
      <div class="card-icon">📐</div>
      <div class="card-title">SAPIX算数演習</div>
      <div class="card-chevron">›</div>
    </a>
    <a href="https://komaguchi-wq.github.io/kobetsuba-web-jugyou/" class="card blue">
      <div class="card-icon">📘</div>
      <div class="card-title">コベツバ＆でる順</div>
      <div class="card-chevron">›</div>
    </a>
    <a href="https://komaguchi-wq.github.io/math-challenge/" class="card blue">
      <div class="card-icon">🔢</div>
      <div class="card-title">計算</div>
      <div class="card-chevron">›</div>
    </a>
  </div>
</div>

<div class="section">
  <div class="section-label green">理科</div>
  <div class="card-list">
    <a href="https://komaguchi-wq.github.io/science-daily-check/" class="card green">
      <div class="card-icon">🧪</div>
      <div class="card-title">SAPIX理科</div>
      <div class="card-chevron">›</div>
    </a>
  </div>
</div>

<div class="section">
  <div class="section-label orange">社会</div>
  <div class="card-list">
    <a href="https://komaguchi-wq.github.io/shakai-daily-check/" class="card orange">
      <div class="card-icon">🌍</div>
      <div class="card-title">SAPIX社会</div>
      <div class="card-chevron">›</div>
    </a>
  </div>
</div>

<div class="section">
  <div class="section-label red">国語</div>
  <div class="card-list">
    <a href="https://komaguchi-wq.github.io/kokugo-kotobanavi/" class="card red">
      <div class="card-icon">📖</div>
      <div class="card-title">言葉ナビ</div>
      <div class="card-chevron">›</div>
    </a>
    <a href="https://komaguchi-wq.github.io/goi1400-training/" class="card red">
      <div class="card-icon">📝</div>
      <div class="card-title">語彙力トレーニング</div>
      <div class="card-chevron">›</div>
    </a>
  </div>
</div>

<div class="section">
  <div class="section-label purple">情報・ガイド</div>
  <div class="card-list">
    <a href="https://komaguchi-wq.github.io/sapix-info/" class="card purple">
      <div class="card-icon">📋</div>
      <div class="card-title">SAPIX情報</div>
      <div class="card-chevron">›</div>
    </a>
    <a href="https://komaguchi-wq.github.io/juken-guide/" class="card purple">
      <div class="card-icon">🏫</div>
      <div class="card-title">中学入試ガイド</div>
      <div class="card-chevron">›</div>
    </a>
  </div>
</div>

</div>
</body>
</html>
